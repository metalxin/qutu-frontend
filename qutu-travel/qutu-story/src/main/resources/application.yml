server:
  port: 5040

spring:
  application:
    name: @artifactId@
  mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:qutu-register}:${NACOS_PORT:8848}
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}

security:
  oauth2:
    ignore:
      urls:
        - /v3/api-docs/**
        - /actuator/**

swagger:
  title: 旅行故事
  description: 旅行故事列表、详情、发布接口
  authorization:
    name: qutu OAuth
    auth-regex: ^.*$
    authorization-scope-list:
      - scope: server
        description: server all
    token-url-list:
      - http://${GATEWAY_HOST:qutu-gateway}:${GATEWAY_PORT:9999}/auth/oauth2/token
