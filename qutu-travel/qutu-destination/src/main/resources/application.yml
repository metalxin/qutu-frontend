server:
  port: 5010

spring:
  application:
    name: @artifactId@
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:qutu-mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:qutu_destination}?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowMultiQueries=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:qutu-register}:${NACOS_PORT:8848}
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.sdstudio.qutu.destination.entity
  global-config:
    db-config:
      logic-delete-field: deletedFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

security:
  oauth2:
    ignore:
      urls:
        # 目的地 - 仅公开查询接口
        - /destinations/page
        - /destinations/cities/hot
        - /destinations/regions
        - /destinations/cities
        - /destinations/search
        - /destinations/*
        # 景点 - 仅公开查询接口
        - /spots/page
        - /spots/hot
        - /spots/nearby
        - /spots/search
        - /spots/city/*
        - /spots/*/guides
        - /spots/*/images
        - /spots/*
        # 分类 - 仅公开查询接口
        - /categories/tree
        - /categories/roots
        - /categories/*/children
        # 标签 - 仅公开查询接口
        - /tags
        # 攻略 - 仅公开查询接口
        - /guides/page
        - /guides/hot
        - /guides/search
        - /guides/*/spots
        - /guides/*
        - /v3/api-docs/**
        - /actuator/**

swagger:
  title: 目的地管理模块
  description: 目的地、景点、评论等接口
  license: Apache License 2.0
  licenseUrl: https://www.apache.org/licenses/LICENSE-2.0
  terms-of-service-url: https://www.qutu.cn
  contact:
    name: qutu
    email: admin@qutu.cn
    url: https://www.qutu.cn
  authorization:
    name: qutu OAuth
    auth-regex: ^.*$
    authorization-scope-list:
      - scope: server
        description: server all
    token-url-list:
      - http://${GATEWAY_HOST:qutu-gateway}:${GATEWAY_PORT:9999}/auth/oauth2/token
