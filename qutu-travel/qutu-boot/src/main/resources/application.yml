server:
  port: 9999    # 项目端口
  servlet:
    context-path: /admin  # 项目访问路径

spring:
  application:
    name: @project.artifactId@  # 服务名称，取 pom.xml 中的 artifactId
  # 上传文件大小限制
  servlet:
    multipart:
      max-file-size: 100MB # 单个文件最大
      max-request-size: 100MB # 接收的最大请求大小
  cloud:
    openfeign:
      enabled: false  # 关闭feign
      loadbalancer:
        enabled: false  # 关闭负载均衡
      client:
        config:
          qutu-upms-biz:
            url: http://127.0.0.1:${server.port}${server.servlet.context-path}
          qutu-auth:
            url: http://127.0.0.1:${server.port}${server.servlet.context-path}
    discovery:
      client:
        simple:
          instances:
            qutu-upms-biz:
              - uri: http://127.0.0.1:${server.port}${server.servlet.context-path}
            qutu-auth:
              - uri: http://127.0.0.1:${server.port}${server.servlet.context-path}
    nacos:  # 单机版本关闭nacos 服务发现和配置管理的能力
      config:
        enabled: false
      discovery:
        enabled: false
  freemarker: # freemarker 配置，授权码模式页面渲染使用
    suffix: .ftl
    template-loader-path: classpath:/templates/
    request-context-attribute: request
  main:
    allow-bean-definition-overriding: true # 允许覆盖bean定义
  profiles:
    active: dev  # 激活dev，对应 application-dev.yml
  quartz:
    properties:
      org:
        quartz:
          jobStore:
            tablePrefix: qrtz_

qutu:
  feign:
    path-prefix: ${server.servlet.context-path:}


## spring security 对外暴露接口设置（不鉴权直接可访问）
security:
  micro: false
  oauth2:
    ignoreFeign: true
    ignore:
      urls:
        - /webjars/**
        - /v3/api-docs/**
        - /doc.html
        - /swagger-ui.html
        - /swagger-ui/**
        - /swagger-resources
        - /code/image
        - /email/code
        - /error
        - /oauth2/token
        - /token/**
        - /actuator/**
        # 目的地 - 仅公开查询接口
        - /destinations/page
        - /destinations/cities/hot
        - /destinations/regions
        - /destinations/cities
        - /destinations/search
        - /destinations/*
        # 景点 - 仅公开查询接口（注意：/spots/* 只匹配一层路径，管理端 /spots/*/edit 等不匹配）
        - /spots/page
        - /spots/hot
        - /spots/nearby
        - /spots/search
        - /spots/city/*
        - /spots/*/guides
        - /spots/*/images
        - /spots/*
        # 分类 - 仅公开查询接口
        - /categories/tree
        - /categories/roots
        - /categories/*/children
        # 标签 - 仅公开查询接口
        - /tags
        # 攻略 - 仅公开查询接口
        - /guides/page
        - /guides/hot
        - /guides/search
        - /guides/*/spots
        - /guides/*
        # 足迹
        - /footprints/page
        - /footprints/*
        # 行程规划
        - /planning/*
        # 附近
        - /nearby/*



#--------------如下配置尽量不要变动-------------
# mybatis-plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/*Mapper.xml # mapper文件位置
  global-config:
    banner: false # 是否打印 mybatis-plus banner
    db-config:
      id-type: auto  # 主键类型
      where-strategy: not_empty # where 条件策略
      insert-strategy: not_empty # 插入策略
      update-strategy: not_null  # 更新策略
  type-handlers-package: cn.sdstudio.qutu.common.mybatis.handler # 类型处理器包
  configuration:
    jdbc-type-for-null: 'null' # 是否设置字段为null
    call-setters-on-nulls: true # 是否调用set方法时传入null值
    shrink-whitespaces-in-sql: true # 去掉sql中多余的空格
